name: pg-replica-test

x-node-env: &node-env
  PGDATA: "/var/lib/postgresql/data"
  RAFT_PORT: "7400"
  PEERS: "1@node1:7400,2@node2:7400,3@node3:7400"
  PG_ADDRS: "1@node1:5432,2@node2:5432,3@node3:5432"
  SEED_HOST: "node1"
  SU_PASSWORD: "${SU_PASSWORD:-pgr_super_pw}"
  REPL_PASSWORD: "${REPL_PASSWORD:-pgr_repl_pw}"
  APP_USER: "${APP_USER:-weido}"
  APP_PASSWORD: "${APP_PASSWORD:-weido_test_pw}"
  APP_DB: "${APP_DB:-weido}"
  PGR_SUPERVISE: "hold"
  SYNCHRONOUS: "${SYNCHRONOUS:-off}"
  WAL_KEEP: "${WAL_KEEP:-512MB}"
  MAX_WAL: "${MAX_WAL:-1GB}"
  COMPACT_THRESHOLD: "${COMPACT_THRESHOLD:-64}"

x-node-base: &node-base
  image: pg-replica-paradedb:test
  build:
    context: ..
    dockerfile: docker/Dockerfile
    args:
      TEST_TOOLS: "1"
  cap_add: [NET_ADMIN, SYS_PTRACE]
  init: true
  restart: "no"
  networks: [pgr]

services:
  node1:
    <<: *node-base
    container_name: pgr-node1
    environment:
      <<: *node-env
      NODE_ID: "1"
    volumes: [node1data:/var/lib/postgresql/data, node1raft:/var/lib/postgresql/raft]
    ports: ["5432:5432"]

  node2:
    <<: *node-base
    container_name: pgr-node2
    depends_on: [node1]
    environment:
      <<: *node-env
      NODE_ID: "2"
    volumes: [node2data:/var/lib/postgresql/data, node2raft:/var/lib/postgresql/raft]
    ports: ["5433:5432"]

  node3:
    <<: *node-base
    container_name: pgr-node3
    depends_on: [node1]
    environment:
      <<: *node-env
      NODE_ID: "3"
    volumes: [node3data:/var/lib/postgresql/data, node3raft:/var/lib/postgresql/raft]
    ports: ["5434:5432"]

  runner:
    image: pg-replica-runner:test
    build:
      context: ..
      dockerfile: docker/Dockerfile.runner
    container_name: pgr-runner
    environment:
      SU_PASSWORD: "${SU_PASSWORD:-pgr_super_pw}"
    volumes:
      - ..:/work
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /work
    networks: [pgr]

volumes:
  node1data:
  node2data:
  node3data:
  node1raft:
  node2raft:
  node3raft:

networks:
  pgr:
    driver: bridge
